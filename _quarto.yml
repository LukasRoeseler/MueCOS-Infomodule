project:
  type: website
  output-dir: docs
  
website:
  announcement: 
    icon: info-circle
    dismissable: true
    content: "**Achtung** - Diese Seite befindet sich im Aufbau und ist noch unvollständig."
    type: primary
    position: below-navbar
  
  image: "logo.png"
  favicon: "logo.png"
  
  title: "Open Science Infomodule"
  
  navbar:
    background: "#ffffff"
    collapse-below: lg
    left:
      - href: fächerübergreifend.qmd
        text: "FÄCHERÜBERGREIFENDE INFORMATIONEN"
      - text: "|"
      - href: quantitativ.qmd
        text: "QUANTITATIVE FORSCHUNG"
      - text: "|"
      - href: qualitativ.qmd
        text: "QUALITATIVE FORSCHUNG"
      - text: "|"
      - href: themen.qmd
        text: "THEMEN UND ANSPRECHPERSONEN"
      - text: "|"
      - href: flyerlanding.qmd
        text: "FLYER & CHEATSHEETS"
      - text: "|"
      - href: antragsmodule.qmd
        text: "ANTRAGSMODULE"
      - text: "|"
      - href: about.qmd
        text: "ÜBER DIE INFOMODULE"
        
    tools:
      - icon: github
        href: https://github.com/LukasRoeseler/MueCOS-Infomodule
        
  sidebar:
   - id: fächerübergreifend
     title: "Allgemeine Informationen"
     style: "floating"
     collapse-level: 2
     align: left
     contents:
       - fächerübergreifend.qmd
       - text: "1. Forschungsfragen und Forschungsplanung"
         href: übergreifend/gen_1.qmd
       - text: "2. Materialien und Daten"
         href: übergreifend/gen_2.qmd
       - text: "3. Forschungsergebnisse veröffentlichen"
         href: übergreifend/gen_3.qmd
       - text: "4. Forschungsergebnisse kommunizieren"
         href: übergreifend/gen_4.qmd
   - id: quantitativ
     title: "Quantitative Forschung"
     style: "floating"
     collapse-level: 2
     align: left
     contents:
      - quantitativ.qmd
      - text: "1. Forschungsfragen und Forschungsplanung"
        href: quantitativ/quant_1.qmd
      - text: "2. Materialien und Daten"
        href: quantitativ/quant_2.qmd
      - text: "3. Forschungsergebnisse veröffentlichen"
        href: quantitativ/quant_3.qmd
      - text: "4. Forschungsergebnisse kommunizieren"
        href: quantitativ/quant_4.qmd
          
   - id: qualitativ
     title: "Qualitative Forschung"
     style: "floating"
     collapse-level: 2
     align: left
     contents:
       - qualitativ.qmd
       - text: "1. Forschungsfragen und Forschungsplanung"
         href: qualitativ/qual_1.qmd
       - text: "2. Materialien und Daten"
         href: qualitativ/qual_2.qmd
       - text: "3. Forschungsergebnisse veröffentlichen"
         href: qualitativ/qual_3.qmd
       - text: "4. Forschungsergebnisse kommunizieren"
         href: qualitativ/qual_4.qmd
          
   - id: formal
     title: "Formale Forschung"
     style: "floating"
     collapse-level: 2
     align: left
     contents:
       - formal.qmd
            
   - id: flyerinfos
     title: "Flyer & Cheatsheets"
     style: "floating"
     collapse-level: 2
     align: left
     contents:
      - flyerlanding.qmd
      - text: "Open Access"
        href: flyerinfos/openaccess.qmd
      - text: "Preregistration"
        href: flyerinfos/preregistration.qmd

   - id: antragsmodule
     title: "Antragsmodule"
     style: "floating"
     collapse-level: 2
     align: left
     contents:
      - antragsmodule.qmd
          
  page-footer:
    right: "Mit [Quarto](https://quarto.org/) erstellt"
    left: "&copy; Copyright 2026, Münster Center for Open Science"

format:
  html:
    theme: 
      - cosmo
      - custom.scss
    page-layout: article
    grid:
      margin-width: 350px 
    toc: true
editor: source